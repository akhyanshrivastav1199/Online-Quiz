<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Start Screen -->
    <div class="quiz-box" id="start-screen">
        <h1>Online Quiz System</h1>

        <p class="welcome">
            Welcome! Test your knowledge by answering 25 multiple-choice questions.
        </p>

        <div class="rules">
            <h3>Quiz Rules</h3>

            <ul>
                <li>Total Questions : 25</li>
                <li>Only One Correct Answer</li>
                <li>Score will be shown at the end</li>
                <li>Click Start Quiz to Begin</li>
            </ul>
        </div>

        <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-box" id="quiz-screen" style="display:none;">

        <div class="top-bar">
            <span id="progress">Question 1 / 10</span>
            <span id="score">Score : 0</span>
        </div>

        <h2 id="question"></h2>

        <div id="options"></div>

    </div>

    <!-- Result Screen -->
    <div class="quiz-box" id="result-screen" style="display:none;">

        <h1>Quiz Completed 🎉</h1>

        <h2 id="final-score"></h2>

        <h3 id="percentage"></h3>

        <h2 id="result"></h2>

        <button id="restart-btn">Restart Quiz</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
